name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semrel.outputs.new_release_version }}
      published: ${{ steps.semrel.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: install cargo-edit
        run: cargo install cargo-edit --locked

      - name: semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release.outputs.version }}
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}

      - name: build
        run: cargo build --release --locked --target ${{ env.TARGET }}

      - name: package
        run: |
          mkdir -p dist
          tar -C target/${TARGET}/release -czf \
            dist/webviewrs-${VERSION}-${TARGET}.tar.gz webviewrs
          (cd dist && sha256sum webviewrs-${VERSION}-${TARGET}.tar.gz \
            > webviewrs-${VERSION}-${TARGET}.tar.gz.sha256)

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: |
            dist/webviewrs-*.tar.gz
            dist/webviewrs-*.tar.gz.sha256
